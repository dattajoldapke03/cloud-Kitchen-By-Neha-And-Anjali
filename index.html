<!DOCTYPE html>
<html>
<head>
  <title>Neha And Anjali's Cloud Kitchen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <button onclick="viewCart()">🛒 Cart</button>
  <button onclick="openAdmin()">📊 Admin</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page">
  <h2>Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
  <h2>Food Menu</h2>

  <div>
    <button onclick="displayProducts(products)">All</button>
    <button onclick="filterCat('veg')">Veg</button>
    <button onclick="filterCat('paratha')">Paratha</button>
    <button onclick="filterCat('nonveg')">NonVeg</button>
    <button onclick="filterCat('snacks')">Snacks</button>
    <button onclick="filterCat('drinks')">Drinks</button>
    <button onclick="filterCat('desserts')">Desserts</button>
  </div>

  <div id="products"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
  <h2>Cart</h2>
  <div id="cartItems"></div>

  <h3>Address</h3>
  <input id="address" placeholder="Enter address">

  <h3>Payment</h3>
  <label><input type="radio" name="pay" value="UPI"> UPI</label>
  <label><input type="radio" name="pay" value="COD"> COD</label>

  <div id="upiBox" style="display:none;">
    <input id="upi" placeholder="Enter UPI ID">
  </div>

  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- BILL -->
<div id="billPage" class="page">
  <h2>Invoice</h2>
  <div id="bill"></div>
  <button onclick="printBill()">🖨️ Print Bill</button>
  <button onclick="showPage('homePage')">Go to Home</button>
</div>

<!-- ADMIN -->
<div id="adminPage" class="page">
  <h2>All Orders</h2>
  <div id="orders"></div>
  <button onclick="showPage('homePage')">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
