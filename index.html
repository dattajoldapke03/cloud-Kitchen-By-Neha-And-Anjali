<!DOCTYPE html>
<html>
<head>
  <title>Food App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  <button onclick="viewCart()">Cart</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="page">
  <h2>Login</h2>
  <input placeholder="Username"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
  <h2>Food Menu</h2>

  <input id="search" placeholder="Search..." onkeyup="searchFood()"><br><br>

  <button onclick="displayProducts(products)">All</button>
  <button onclick="filterCat('veg')">Veg</button>
  <button onclick="filterCat('paratha')">Paratha</button>

  <div id="products" class="grid"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
  <h2>Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
</div>

<!-- PAYMENT -->
<div id="paymentPage" class="page">
  <h2>Payment</h2>

  <input id="address" placeholder="Enter Address"><br><br>

  <input type="radio" name="pay" value="UPI" checked> UPI
  <input type="radio" name="pay" value="COD"> COD <br><br>

  <input id="upi" placeholder="Enter UPI ID"><br><br>

  <button onclick="placeOrder()">Confirm</button>
</div>

<!-- BILL -->
<div id="billPage" class="page">
  <div id="bill"></div>
</div>

<script src="script.js"></script>
</body>
</html>
